name: Scrape Dealer Prices

on:
  schedule:
    # 2x/jour, espacé de 12h — 08:00 et 20:00 UTC (10h et 22h Paris en CEST)
    # Godot + Pièces-Or rafraîchis 2x/jour (évite le "il y a 1j" sur la prod)
    - cron: '0 8,20 * * *'
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: scripts/scrapers
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: scripts/scrapers
        run: pnpm exec playwright install chromium

      - name: Run scrapers and insert into Supabase
        working-directory: scripts/scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: pnpm exec tsx setup-db.ts

      - name: Report status
        if: failure()
        run: echo "Scraping failed - check logs above"
